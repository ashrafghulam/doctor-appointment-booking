<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login | Dr. Aryan Sharma</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="/css/style.css" rel="stylesheet" />
</head>

<body>
    <div class="d-flex align-items-center justify-content-center" style="min-height:100vh">
        <div class="float-shape s1"></div>
        <div class="float-shape s2"></div>
        <div class="glass-card position-relative" style="width:100%;max-width:420px">
            <div class="text-center mb-4">
                <div
                    style="width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--clr-primary),var(--clr-accent));margin:0 auto 1rem;display:flex;align-items:center;justify-content:center">
                    <i class="bi bi-shield-lock-fill" style="font-size:1.8rem;color:var(--clr-white)"></i>
                </div>
                <h4 style="color:var(--clr-white)">Admin Login</h4>
                <p style="color:var(--clr-text-dim);font-size:.9rem">Sign in to manage appointments</p>
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-control form-control-dark" placeholder="admin@doctor.com"
                        required />
                </div>
                <div class="mb-4">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-control form-control-dark" placeholder="••••••••"
                        required />
                </div>
                <button type="submit" class="btn-glow w-100" id="loginBtn"><i class="bi bi-box-arrow-in-right"></i> Sign
                    In</button>
            </form>
            <div class="text-center mt-3">
                <a href="/" style="font-size:.85rem;color:var(--clr-text-dim)"><i class="bi bi-arrow-left"></i> Back to
                    website</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Signing in...';

            const data = {
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
            };

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });
                const result = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('adminEmail', result.email);
                    window.location.href = '/admin/dashboard.html';
                } else {
                    alert(result.error || 'Login failed');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
                }
            } catch {
                alert('Server error');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
            }
        });
    </script>
</body>

</html>
